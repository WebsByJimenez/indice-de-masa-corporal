<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Calculadora de IMC con indicador visual y consejos personalizados" />
    <title>Mi Calculadora de IMC</title>
    <link rel="stylesheet" href="./css/estilos.css" />
    <link rel="icon" href="./img/IMC.png" type="image/png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet" />
  </head>

  <body>
    <main class="container">
      <h1 class="heading">Tu Salud Digital</h1>
      <p class="subheading">Calcula tu Índice de Masa Corporal (IMC)</p>

      <div class="input-group">
        <label for="gender">Género:</label>
        <select id="gender" class="input">
          <option value="male">Hombre</option>
          <option value="female">Mujer</option>
        </select>
      </div>

      <div class="input-group">
        <label for="height">Tu altura en centímetros:</label>
        <input type="number" class="input" id="height" min="50" max="250" placeholder="Ej. 160" />
      </div>

      <div class="input-group">
        <label for="weight">Tu peso en kilogramos:</label>
        <input type="number" class="input" id="weight" min="2" max="500" placeholder="Ej. 60" />
      </div>

      <button class="btn" id="btn">Calcular mi IMC</button>

      <section class="results">
        <h2 class="visually-hidden">Resultados del cálculo</h2>

        <div class="result-main">
          <output id="bmi-result" class="bmi-value">--.-</output>
          <span class="bmi-unit">kg/m²</span>
        </div>

        <div class="bmi-gauge-container">
          <div class="bmi-gauge-bar">
            <div id="bmi-pointer" class="bmi-pointer"></div>
          </div>
          <div class="gauge-labels">
            <span>Bajo</span>
            <span>Normal</span>
            <span>Sobrepeso</span>
            <span>Obesidad</span>
          </div>
        </div>

        <div class="result-condition">
          <span class="info-text">Tu Condición Actual:</span>
          <p id="weight-condition" class="condition-value">--</p>
          <p id="advice-text" class="advice-text"></p>
        </div>
      </section>
    </main>
    <script src="./js/index.js"></script>
  </body>
</html>
